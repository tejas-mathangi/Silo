services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - silo-network

  app:
    build: .
    environment:
      - QDRANT_URL=http://qdrant:6333
      - ENV=development
    depends_on:
      - qdrant
    volumes:
      - .:/app
      - /app/.venv
    networks:
      - silo-network

networks:
  silo-network:
    driver: bridge

volumes:
  qdrant_storage:
